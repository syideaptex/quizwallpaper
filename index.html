function calcResult(answers) {
  const s = {};PRIORITY.forEach((t) => s[t] = 0);
  answers.forEach((ai, qi) => SCORE_MAP[qi][ai].forEach((t) => s[t]++));
  let best = PRIORITY[0],top = -1;
  for (const t of PRIORITY) if (s[t] > top) {top = s[t];best = t;}
  return TYPE_TO_RESULT[best];
}

function Quiz({ onDone, onBack }) {
  const [qi, setQi] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [sel, setSel] = useState(null);
  const [vis, setVis] = useState(true);

  const q = QUESTIONS[qi];

  const choose = (i) => {
    if (sel !== null) return;
    setSel(i);
    setTimeout(() => {
      const next = [...answers, i];
      setVis(false);
      setTimeout(() => {
        if (qi < 4) {setAnswers(next);setQi(qi + 1);setSel(null);setVis(true);} else
        {onDone(next);}
      }, 350);
    }, 480);
  };

  const back = () => {
    if (qi === 0) {onBack();return;}
    setVis(false);
    setTimeout(() => {setQi(qi - 1);setAnswers(answers.slice(0, -1));setSel(null);setVis(true);}, 300);
  };

  return (
    <div style={{ minHeight: '100vh', background: '#F4F0E8', display: 'flex', flexDirection: 'column' }}>
      {/* Top bar */}
      <div style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 200, background: 'rgba(28,26,46,.93)', backdropFilter: 'blur(12px)' }}>

function Loading({ onDone }) {

  useEffect(() => {
    const t = setInterval(() => {
      setPct((p) => {
        if (p >= 100) {clearInterval(t);setTimeout(onDone, 400);return 100;}
        return p + 2.2;

      setWi((i) => (i + 1) % THEMES.length);
    }, 45);
    return () => clearInterval(t);

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden', background: THEMES[wi].g, transition: 'background .1s linear' }}>

        <p style={{ fontFamily: 'var(--fb)', fontSize: '14px', color: 'rgba(28,26,46,.45)', margin: '0 0 36px' }}>{r.mainSeries} · {r.name}</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '11px', alignItems: 'center' }}>
          <Btn size="lg" variant="dark" onClick={() => window.open(r.url, '_blank')} sx={{ width: '100%', maxWidth: '340px' }}>查看這個系列商品 →</Btn>
          <Btn size="lg" variant="outline" onClick={() => window.open('https://www.syideashop.com', '_blank')} sx={{ width: '100%', maxWidth: '340px' }}>前往官網看更多案例</Btn>
          <Btn size="lg" variant="ghost" onClick={onRetake} sx={{ width: '100%', maxWidth: '340px' }}>再測一次</Btn>
        </div>
      </div>

      {/* ── Share ── */}
      <div style={{ background: 'rgba(28,26,46,.04)', borderTop: '1px solid rgba(28,26,46,.08)', padding: '48px 28px 80px', textAlign: 'center' }}>
        <div style={{ fontFamily: 'var(--fl)', fontSize: '10px', letterSpacing: '.14em', color: 'rgba(28,26,46,.3)', marginBottom: '10px', textTransform: 'uppercase' }}>Share</div>
        <h3 style={{ fontFamily: 'var(--fd)', fontSize: '22px', color: '#1C1A2E', margin: '0 0 26px', fontWeight: 600 }}>把你的結果分享出去</h3>
        <div style={{ display: 'flex', gap: '10px', justifyContent: 'center', flexWrap: 'wrap' }}>
          <Btn variant="ghost" onClick={() => window.open(`https://line.me/R/share?text=${encodeURIComponent('我測出來是「' + r.name + '」！測測你是哪種牆面人格 ' + window.location.href)}`)}>分享到 LINE</Btn>
          <Btn variant="ghost" onClick={copyLink}>複製連結</Btn>
          <Btn variant="ghost" onClick={() => alert('截圖畫面後，直接分享到 Instagram Story！')}>分享到 IG</Btn>
        </div>
      </div>
    </div>);

}

// ── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [scene, setScene] = useState('landing');
  const [rk, setRk] = useState(null);

  const goQuiz = () => {window.scrollTo(0, 0);setScene('quiz');};
  const goLanding = () => {window.scrollTo(0, 0);setScene('landing');};

  const finishQuiz = (ans) => {
    const result = calcResult(ans);
    setRk(result);
    setScene('loading');
  };

  const afterLoad = () => {window.scrollTo(0, 0);setScene('result');};

  return (
    <div>
      {(scene === 'landing' || scene === 'result') && <Nav onLogo={goLanding} />}
      {scene === 'landing' && <Landing onStart={goQuiz} />}
      {scene === 'quiz' && <Quiz onDone={finishQuiz} onBack={goLanding} />}
      {scene === 'loading' && <Loading onDone={afterLoad} />}
      {scene === 'result' && rk && <Result rk={rk} onRetake={goLanding} />}
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
