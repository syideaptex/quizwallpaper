const ANALYTICS = {

  SHEETS_URL: 'YOUR_APPS_SCRIPT_URL_HERE',

  enabled: false,

// ── 送資料到 Google Sheets ──────────────────────────────────────
function trackToSheets(resultKey, resultName, answers) {
  if (!ANALYTICS.enabled || !ANALYTICS.SHEETS_URL || ANALYTICS.SHEETS_URL.includes('YOUR_')) return;
  try {
    fetch(ANALYTICS.SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',   // Apps Script 不回 CORS header,但資料仍會送到
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        resultKey,
        resultName,
        answers,
        ua: navigator.userAgent,
        mobile: /Mobi|Android|iPhone/i.test(navigator.userAgent),
      }),
    });
  } catch (e) { console.warn('Sheets tracking failed:', e); }
}

// ── 送 Custom Event 到 GA4 ──────────────────────────────────────
function trackToGA(resultKey, resultName) {
  if (!ANALYTICS.enabled) return;
  try {
    if (typeof gtag === 'function') {
      gtag('event', 'quiz_completed', {
        result_type: resultKey,
        result_name: resultName,
      });
    }
  } catch (e) { console.warn('GA tracking failed:', e); }
}

// ── 追蹤 CTA 點擊(查看系列商品)─────────────────────────────────
function trackCTAClick(seriesName) {
  if (!ANALYTICS.enabled) return;
  try {
    if (typeof gtag === 'function') {
      gtag('event', 'cta_click', { series_name: seriesName });
    }
  } catch (e) {}
}

// ── 追蹤分享動作 ───────────────────────────────────────────────

  if (!ANALYTICS.enabled) return;
  try {

function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((key, val) => {
    setValues(prev => ({ ...prev, [key]: val }));
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*'); } catch {}
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title, children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clamp = useCallback(() => {
    const p = dragRef.current; if (!p) return;
    const w = p.offsetWidth, h = p.offsetHeight;
    const maxR = Math.max(PAD, window.innerWidth - w - PAD);
    const maxB = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxR, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxB, Math.max(PAD, offsetRef.current.y)),
    };
    p.style.right = offsetRef.current.x + 'px';
    p.style.bottom = offsetRef.current.y + 'px';
  }, []);

  useEffect(() => {
    if (!open) return;
    clamp();
    const ro = new ResizeObserver(clamp);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clamp]);

  useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch {}
  };

  const onDragStart = (e) => {
    const p = dragRef.current; if (!p) return;
    const r = p.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const sR = window.innerWidth - r.right;
    const sB = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: sR - (ev.clientX - sx), y: sB - (ev.clientY - sy) };
      clamp();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
      <div className="twk-hd" onMouseDown={onDragStart}>
        <b>{title}</b>
        <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
      </div>
      <div className="twk-body">{children}</div>
    </div>
  );
}

function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }
function TweakSegmented({ label, value, options, onChange }) {
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span><span className="twk-val">{opts[idx]?.label}</span></div>
      <div className="twk-seg" role="radiogroup">
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map(o => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value} onClick={() => onChange(o.value)}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

// ── HORIZONTAL CAROUSEL ───────────────────────────────────────────────────────
function ThemeCarousel({ onStart }) {
  const trackRef = useRef(null);
  const [canL, setCanL] = useState(false);
  const [canR, setCanR] = useState(true);

  const updateArrows = useCallback(() => {
    const el = trackRef.current; if (!el) return;
    setCanL(el.scrollLeft > 8);
    setCanR(el.scrollLeft < el.scrollWidth - el.clientWidth - 8);
  }, []);

  useEffect(() => {
    const el = trackRef.current; if (!el) return;
    updateArrows();
    el.addEventListener('scroll', updateArrows, { passive: true });
    window.addEventListener('resize', updateArrows);
    return () => {
      el.removeEventListener('scroll', updateArrows);
      window.removeEventListener('resize', updateArrows);
    };
  }, [updateArrows]);

  const scrollBy = (dir) => {
    const el = trackRef.current; if (!el) return;
    const card = el.querySelector('[data-card]');
    const w = card ? card.offsetWidth + 14 : 280;
    el.scrollBy({ left: dir * w * 2, behavior: 'smooth' });
  };

  // drag-to-scroll for desktop
  useEffect(() => {
    const el = trackRef.current; if (!el) return;
    let isDown = false, startX, scrollLeft;
    const down = (e) => { isDown = true; startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; el.style.cursor = 'grabbing'; };
    const leave = () => { isDown = false; el.style.cursor = 'grab'; };
    const move = (e) => { if (!isDown) return; e.preventDefault(); el.scrollLeft = scrollLeft - (e.pageX - el.offsetLeft - startX); };
    el.style.cursor = 'grab';
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseleave', leave);
    el.addEventListener('mouseup', leave);
    el.addEventListener('mousemove', move);
    return () => {
      el.removeEventListener('mousedown', down);
      el.removeEventListener('mouseleave', leave);
      el.removeEventListener('mouseup', leave);
      el.removeEventListener('mousemove', move);
    };
  }, []);

  return (
    <div style={{ position:'relative' }}>
      {/* fade edges */}

// ── QUIZ ──────────────────────────────────────────────────────────────────────
function Quiz({ onDone, onBack }) {
  const [qi, setQi] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [sel, setSel] = useState(null);
  const [vis, setVis] = useState(true);

  const q = QUESTIONS[qi];

  const choose = (i) => {
    if (sel !== null) return;
    setSel(i);
    setTimeout(() => {
      const next = [...answers, i];
      setVis(false);
      setTimeout(() => {
        if (qi < 4) { setAnswers(next); setQi(qi + 1); setSel(null); setVis(true); }
        else { onDone(next); }
      }, 350);
    }, 480);
  };

  const back = () => {
    if (qi === 0) { onBack(); return; }
    setVis(false);
    setTimeout(() => { setQi(qi - 1); setAnswers(answers.slice(0, -1)); setSel(null); setVis(true); }, 300);
  };

  const progress = (qi + 1) / 5 * 100;

  return (
    <div style={{ minHeight:'100vh',background:'var(--page-bg,#F4F0E8)',display:'flex',flexDirection:'column' }}>
      {/* Top bar — 加強進度條的視覺存在感 */}
      <div style={{ position:'fixed',top:0,left:0,right:0,zIndex:200,background:'rgba(244,240,232,.92)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(28,26,46,.08)' }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 28px' }}>
          <button onClick={back} style={{ background:'none',border:'none',cursor:'pointer',color:'rgba(28,26,46,.6)',fontFamily:'var(--fl)',fontSize:'13px',display:'flex',alignItems:'center',gap:'5px',fontWeight:500 }}>
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M10 4L6 8l4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
            返回
          </button>
          <div style={{ display:'flex',alignItems:'center',gap:'14px' }}>
            <span style={{ fontFamily:'var(--fl)',fontSize:'12px',color:'rgba(28,26,46,.55)',letterSpacing:'.08em',fontVariantNumeric:'tabular-nums' }}>
              {String(qi+1).padStart(2,'0')} <span style={{opacity:.4}}>/ 05</span>
            </span>
          </div>
        </div>
        {/* 加粗的進度條 */}
        <div style={{ height:'4px',background:'rgba(28,26,46,.07)',position:'relative' }}>
          <div style={{ height:'100%',background:'var(--accent,#7B8FC8)',width:`${progress}%`,transition:'width .6s cubic-bezier(.16,1,.3,1)',boxShadow:'0 0 8px var(--accent,#7B8FC8)' }} />
        </div>
      </div>

      <div style={{ flex:1,paddingTop:'100px',paddingBottom:'60px',display:'flex',flexDirection:'column',alignItems:'center',opacity:vis?1:0,transform:vis?'none':'translateY(12px)',transition:'all var(--quiz-fade,.4s) cubic-bezier(.16,1,.3,1)' }}>
        <div style={{ width:'100%',maxWidth:'780px',padding:'0 20px' }}>
          <div style={{ fontFamily:'var(--fl)',fontSize:'10px',letterSpacing:'.18em',color:'var(--accent,#7B8FC8)',marginBottom:'14px',textTransform:'uppercase' }}>{q.eyebrow}</div>
          <h2 style={{ fontFamily:'var(--fd)',fontSize:'clamp(22px,4.5vw,38px)',color:'#1C1A2E',lineHeight:1.38,margin:'0 0 36px',fontWeight:600,whiteSpace:'pre-line' }}>{q.text}</h2>
          <div style={{ display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'12px' }}>
            {q.options.map((opt, i) => {
              const isSel = sel === i;
              return (
                <div key={i} onClick={() => choose(i)} style={{ position:'relative',borderRadius:'18px',overflow:'hidden',aspectRatio:'4/5',cursor:'pointer',background:opt.g,boxShadow:isSel?`0 0 0 3px var(--accent,#7B8FC8),0 12px 32px rgba(28,26,46,.18)`:'0 3px 14px rgba(28,26,46,.08)',transform:isSel?'scale(.97)':'scale(1)',transition:'all .3s cubic-bezier(.16,1,.3,1)',animation:`slideUp .5s cubic-bezier(.16,1,.3,1) ${i*0.06}s both` }}>
                  {/* Unsplash 情境照 */}
                  <img src={opt.img} alt={opt.label} loading="lazy"
                       style={{ position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',filter:'saturate(1.05)' }} />
                  {/* 漸層蒙層,確保文字可讀 */}
                  <div style={{ position:'absolute',inset:0,background:'linear-gradient(to top,rgba(20,18,32,.85) 0%,rgba(20,18,32,.25) 50%,rgba(20,18,32,.08) 100%)' }} />
                  {isSel && <div style={{ position:'absolute',top:'14px',right:'14px',width:'28px',height:'28px',borderRadius:'50%',background:'var(--accent,#7B8FC8)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2,animation:'fadeIn .25s ease both',boxShadow:'0 4px 12px rgba(0,0,0,.3)' }}>

                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );

// ── LOADING ───────────────────────────────────────────────────────────────────
// 拉長到 ~6 秒,主題切換從 50ms 改成 700ms (慢 14 倍),配 cross-fade 不再閃
function Loading({ onDone }) {
  const [pct, setPct] = useState(0);
  const [wi, setWi] = useState(0);
  const [phase, setPhase] = useState('正在分析你的答案…');

  useEffect(() => {
    // 進度條 ~6 秒
    const t = setInterval(() => {
      setPct(p => {
        if (p >= 100) { clearInterval(t); setTimeout(onDone, 700); return 100; }
        return p + 0.85;
      });
    }, 50);
    return () => clearInterval(t);
  }, [onDone]);

  useEffect(() => {
    // 主題慢慢輪播,每 700ms 換一個
    const t = setInterval(() => setWi(i => (i + 1) % THEMES.length), 700);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    // 階段文字
    const phases = [
      { at: 0, text: '正在分析你的答案…' },
      { at: 30, text: '比對 9 種主題傾向…' },
      { at: 65, text: '為你選一面最對的牆…' },
      { at: 92, text: '即將揭曉…' },
    ];
    const next = phases.filter(p => pct >= p.at).pop();
    if (next && next.text !== phase) setPhase(next.text);
  }, [pct, phase]);

  const bg = THEMES[wi].img;

  return (
    <div style={{ minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden',background:'#1C1A2E' }}>
      {/* 用 img + cross-fade,而非每幀換 background,更平滑 */}
      {THEMES.map((t, i) => (
        <img key={t.key} src={t.img} alt="" loading="eager"
             style={{ position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:i===wi?1:0,transition:'opacity 1.2s ease',zIndex:0 }} />
      ))}
      <div style={{ position:'absolute',inset:0,background:'rgba(28,26,46,.7)',zIndex:1 }} />
      <div className="grain" style={{zIndex:2}}/>

      <div style={{ position:'relative',zIndex:3,textAlign:'center',padding:'0 28px',animation:'fadeIn .5s ease both' }}>
        <div style={{ fontFamily:'var(--fl)',fontSize:'10px',letterSpacing:'.22em',color:'rgba(255,255,255,.5)',marginBottom:'18px',textTransform:'uppercase' }}>analysing your wall</div>
        <div style={{ fontFamily:'var(--fd)',fontSize:'clamp(22px,4.4vw,32px)',color:'#fff',marginBottom:'16px',letterSpacing:'.02em',animation:'loadingPulse 2.5s ease-in-out infinite' }}>{phase}</div>
        <div style={{ fontFamily:'var(--fl)',fontSize:'12px',color:'rgba(255,255,255,.55)',marginBottom:'40px',letterSpacing:'.08em',minHeight:'18px',transition:'opacity .3s' }}>· {THEMES[wi].name} ·</div>
        <div style={{ width:'240px',height:'2px',background:'rgba(255,255,255,.18)',borderRadius:'2px',margin:'0 auto' }}>
          <div style={{ height:'100%',background:'#fff',width:`${pct}%`,borderRadius:'2px',transition:'width .15s linear',boxShadow:'0 0 10px rgba(255,255,255,.5)' }} />
        </div>
        <div style={{ fontFamily:'var(--fl)',fontSize:'11px',color:'rgba(255,255,255,.45)',marginTop:'16px',letterSpacing:'.1em',fontVariantNumeric:'tabular-nums' }}>{Math.min(100,Math.round(pct))}%</div>
      </div>
    </div>
  );
}

  // 用 html2canvas 把分享卡渲染成 PNG 下載
  const cardRef = useRef(null);
  const [downloading, setDownloading] = useState(false);

                  <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82V14.706h-3.13v-3.622h3.13V8.408c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.464.099 2.795.143v3.24h-1.918c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg>
                </button>
                <button onClick={shareIG} title="分享到 Instagram" style={{ ...iconBtnStyle('transparent'), background:'linear-gradient(45deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%)' }}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                </button>
                <button onClick={copyLink} title="複製連結" style={iconBtnStyle('rgba(28,26,46,.85)')}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                </button>
              </div>
              {/* 下載結果卡 — 主要分享方式 */}
              <button onClick={downloadCard} disabled={downloading}
                      style={{ width:'100%',padding:'10px 12px',borderRadius:'10px',border:'1px solid rgba(28,26,46,.15)',background:'rgba(28,26,46,.04)',cursor:downloading?'wait':'pointer',fontFamily:'var(--fb)',fontSize:'12px',fontWeight:500,color:'#1C1A2E',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',transition:'all .25s' }}>
                {downloading ? (
                  <><span style={{display:'inline-block',width:'12px',height:'12px',border:'1.5px solid currentColor',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>產生圖片中…</>
                ) : (
                  <><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>下載結果卡片 (適合 IG)</>
                )}
              </button>
            </div>

            {/* Stats card */}
            <div style={{ background:'rgba(255,255,255,.55)',borderRadius:'14px',padding:'18px',border:'1px solid rgba(28,26,46,.06)' }}>
              <div style={{ fontFamily:'var(--fb)',fontSize:'13px',color:'#1C1A2E',fontWeight:600,marginBottom:'14px' }}>測驗統計</div>

              <div style={{ display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'8px 0',borderBottom:'1px solid rgba(28,26,46,.07)' }}>
                <span style={{ fontFamily:'var(--fb)',fontSize:'12px',color:'rgba(28,26,46,.6)' }}>已有</span>
                <span><strong style={{ fontFamily:'var(--fl)',fontSize:'19px',color:'#1C1A2E',fontWeight:700,fontVariantNumeric:'tabular-nums' }}>{totalVotes.toLocaleString()}</strong><span style={{ fontFamily:'var(--fb)',fontSize:'11px',color:'rgba(28,26,46,.55)',marginLeft:'4px' }}>人完成測驗</span></span>
              </div>

              <div style={{ display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'8px 0',borderBottom:'1px solid rgba(28,26,46,.07)' }}>
                <span style={{ fontFamily:'var(--fb)',fontSize:'12px',color:'rgba(28,26,46,.6)' }}>和你同類型的有</span>
                <span style={{ fontFamily:'var(--fl)',fontSize:'18px',color:r.accent,fontWeight:700,fontVariantNumeric:'tabular-nums' }}>{myPct}%</span>
              </div>

              <div style={{ padding:'10px 0 0' }}>
                <div style={{ fontFamily:'var(--fb)',fontSize:'12px',color:'rgba(28,26,46,.6)',marginBottom:'4px' }}>最受歡迎風格</div>
                <div style={{ fontFamily:'var(--fd)',fontSize:'14px',color:'#1C1A2E',fontWeight:600,textAlign:'right' }}>{topResult.mainSeries}</div>
                <div style={{ fontFamily:'var(--fl)',fontSize:'11px',color:'rgba(28,26,46,.5)',textAlign:'right',marginTop:'2px',fontVariantNumeric:'tabular-nums' }}>{topPct}% 的人選擇</div>
              </div>
            </div>

            {/* Retake button */}
            <Btn size="md" variant="ghost" onClick={onRetake} style={{ width:'100%' }}>
              再測一次
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            </Btn>
          </div>
        </div>
      </div>

      {/* ── 你可能也會喜歡 — 底部橫排 ── */}
      <div style={{ borderTop:'1px solid rgba(28,26,46,.08)',padding:'40px 28px 80px',background:'rgba(255,255,255,.3)' }}>
        <div style={{ maxWidth:'1280px',margin:'0 auto' }}>
          <div style={{ display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'24px' }}>
            <h3 style={{ fontFamily:'var(--fd)',fontSize:'22px',color:'#1C1A2E',margin:0,fontWeight:600 }}>你可能也會喜歡</h3>
            <button onClick={() => window.open('https://www.syideashop.com/categories/主題式壁布','_blank')} style={{ background:'none',border:'none',cursor:'pointer',fontFamily:'var(--fl)',fontSize:'13px',color:'rgba(28,26,46,.7)',display:'flex',alignItems:'center',gap:'4px' }}>
              查看更多
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          </div>
          <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'12px' }}>
            {r.ext.map(key => {
              const t = THEME_BY_KEY[key]; if (!t) return null;
              return (
                <a key={key} href={t.url} target="_blank" rel="noopener"
                   style={{ position:'relative',aspectRatio:'4/3',borderRadius:'12px',overflow:'hidden',cursor:'pointer',display:'block',textDecoration:'none' }}
                   onMouseEnter={(e) => e.currentTarget.style.transform='translateY(-4px)'}
                   onMouseLeave={(e) => e.currentTarget.style.transform='none'}>
                  <img src={t.img} alt={t.name} loading="lazy"
                       style={{ position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',transition:'transform .35s ease' }} />
                  <div style={{ position:'absolute',inset:0,background:'linear-gradient(to top,rgba(28,26,46,.78) 0%,transparent 60%)' }} />
                  <div style={{ position:'absolute',bottom:0,left:0,right:0,padding:'12px 14px' }}>
                    <div style={{ fontFamily:'var(--fd)',fontSize:'14px',color:'#fff',fontWeight:600 }}>{t.name}</div>
                  </div>
                </a>
              );
            })}
          </div>
        </div>
      </div>

      {/* ── HIDDEN SHARE CARD — 用 html2canvas 渲染成 PNG ── */}
      {/* 1080×1350 IG Story 友善比例 4:5,放在畫面外但仍會被渲染 */}
      {/* 圖片走 wsrv.nl 代理以加上 CORS header,html2canvas 才抓得到像素 */}
      <div ref={cardRef} style={{
        position:'fixed', left:'-9999px', top:0,
        width:'1080px', height:'1350px',
        background:'#F4F0E8',
        fontFamily:'system-ui, sans-serif',
        padding:'80px 70px',
        display:'flex', flexDirection:'column',
        overflow:'hidden'
      }}>
        {/* Top label */}
        <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'40px' }}>
          <div>
            <div style={{ fontSize:'28px',fontWeight:700,color:'#1C1A2E',letterSpacing:'.06em' }}>SYIDEA</div>
            <div style={{ fontSize:'14px',color:'rgba(28,26,46,.55)',letterSpacing:'.16em',textTransform:'uppercase',marginTop:'4px' }}>Wall Quiz · 主題式宣影布</div>
          </div>
          <div style={{ fontSize:'14px',color:'rgba(28,26,46,.5)',letterSpacing:'.18em',textTransform:'uppercase' }}>YOUR WALL</div>
        </div>

        {/* Main content */}
        <div style={{ fontFamily:"'Noto Sans TC',sans-serif",fontSize:'22px',color:'rgba(28,26,46,.6)',marginBottom:'12px' }}>你的空間人格是</div>
        <div style={{ fontFamily:"'Noto Serif TC',serif",fontSize:'68px',color:'#1C1A2E',fontWeight:900,lineHeight:1.05,letterSpacing:'.02em',marginBottom:'8px' }}>{r.mainSeries}</div>
        <div style={{ fontFamily:"'Noto Serif TC',serif",fontSize:'42px',color:'#1C1A2E',fontWeight:600,letterSpacing:'.05em',marginBottom:'40px' }}>{r.name}</div>

        {/* Tagline with quote */}
        <div style={{ position:'relative',padding:'24px 12px 24px 36px',marginBottom:'40px',borderLeft:`4px solid ${r.accent}` }}>
          <span style={{ position:'absolute',left:'8px',top:'8px',fontFamily:"'Noto Serif TC',serif",fontSize:'56px',color:r.accent,lineHeight:1,fontWeight:900 }}>"</span>
          <p style={{ fontFamily:"'Noto Serif TC',serif",fontSize:'28px',color:'#1C1A2E',lineHeight:1.55,whiteSpace:'pre-line',fontStyle:'italic',margin:0,fontWeight:500,paddingLeft:'40px' }}>{r.tagline}</p>
        </div>

        {/* Hero image — 系列模擬圖,走 wsrv 代理確保 CORS */}
        <div style={{ position:'relative',flex:1,borderRadius:'24px',overflow:'hidden',background:r.g,minHeight:'440px',marginBottom:'30px' }}>
          <img src={`https://wsrv.nl/?url=${encodeURIComponent(r.img)}&w=1080&output=jpg`}
               alt={r.mainSeries} crossOrigin="anonymous"
               style={{ position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',display:'block' }} />
        </div>

        {/* Footer with QR-like prompt + URL */}
        <div style={{ display:'flex',justifyContent:'space-between',alignItems:'flex-end',paddingTop:'20px',borderTop:'1px solid rgba(28,26,46,.12)' }}>
          <div>
            <div style={{ fontSize:'13px',color:'rgba(28,26,46,.4)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:'4px' }}>take the quiz</div>
            <div style={{ fontFamily:"'Noto Serif TC',serif",fontSize:'20px',color:'#1C1A2E',fontWeight:500 }}>選一面牆，測出你現在的人生狀態</div>
          </div>
          <div style={{ fontSize:'14px',color:'rgba(28,26,46,.55)',textAlign:'right',letterSpacing:'.04em' }}>
            {window.location.hostname || 'syideashop.com'}<br/>
            <span style={{fontSize:'11px',color:'rgba(28,26,46,.4)',letterSpacing:'.1em',textTransform:'uppercase'}}>{window.location.pathname.replace(/\/$/,'') || ''}</span>
          </div>
        </div>
      </div>

      {/* responsive collapse */}
      <style>{`
        @media (max-width: 900px) {
          .result-grid {
            grid-template-columns: 1fr !important;
            gap: 24px !important;
          }
          /* 手機順序: 答案內容 → POV 圖 → CTA → 分享結果 → 測驗統計 */
          .r-answer { order: 1; }
          .r-image  { order: 2; }
          .r-cta-mobile { order: 3; display: block !important; }
          .r-cta-desktop { display: none; }
          .r-side { order: 4; }
        }
      `}</style>
    </div>
  );
}

const iconBtnStyle = (bg) => ({
  width:'30px',height:'30px',borderRadius:'50%',border:'none',cursor:'pointer',
  background:bg,display:'flex',alignItems:'center',justifyContent:'center',transition:'transform .2s'
});

// ── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [scene, setScene] = useState('landing');
  const [rk, setRk] = useState(null);

  useEffect(() => { applyTweaks(tweaks); }, [tweaks]);

  useEffect(() => {
    const m = window.location.hash.match(/^#result=([\w_]+)/);
    if (m && RESULTS[m[1]]) { setRk(m[1]); setScene('result'); }
  }, []);

  useEffect(() => {
    if (scene === 'result' && rk) {
      const newHash = `#result=${rk}`;
      if (window.location.hash !== newHash) {
        window.history.replaceState(null, '', window.location.pathname + newHash);
      }
    } else if (scene === 'landing' && window.location.hash) {
      window.history.replaceState(null, '', window.location.pathname);
    }
  }, [scene, rk]);

  const goQuiz     = () => { window.scrollTo(0,0); setScene('quiz'); };
  const goLanding  = () => { window.scrollTo(0,0); setRk(null); setScene('landing'); };
  const finishQuiz = (ans) => {
    const key = calcResult(ans);
    const name = RESULTS[key]?.name || key;
    // 送數據到 Google Sheets + GA4
    trackToSheets(key, name, ans);
    trackToGA(key, name);
    setRk(key);
    setScene('loading');
  };
  const afterLoad  = () => { window.scrollTo(0,0); setScene('result'); };

  // landing 用淺色 nav,result 也用淺色 nav (因為背景是淺米白)
  return (
    <div>
      {(scene === 'landing' || scene === 'result') && <Nav onLogo={goLanding} dark={false}/>}
      {scene === 'landing' && <Landing onStart={goQuiz}/>}
      {scene === 'quiz'    && <Quiz onDone={finishQuiz} onBack={goLanding}/>}
      {scene === 'loading' && <Loading onDone={afterLoad}/>}
      {scene === 'result' && rk && <Result rk={rk} onRetake={goLanding}/>}

      <TweaksPanel title="設計微調">
        <TweakSection label="色彩氛圍" />
        <TweakSegmented label="配色" value={tweaks.colorMood}
                        options={['夢幻','沉靜','清新','藝術']}
                        onChange={(v) => setTweak('colorMood', v)} />
        <TweakSection label="字體語感" />
        <TweakSegmented label="排版" value={tweaks.typeVoice}
                        options={['詩意','現代','編輯']}
                        onChange={(v) => setTweak('typeVoice', v)} />
        <TweakSection label="動畫節奏" />
        <TweakSegmented label="速度" value={tweaks.animSpeed}
                        options={[{value:1,label:'慢'},{value:2,label:'中'},{value:3,label:'快'}]}
                        onChange={(v) => setTweak('animSpeed', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
